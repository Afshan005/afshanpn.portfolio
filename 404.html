<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Afshan PN</title>
  <meta name="description"
    content="Oops! The page you're looking for doesn't exist. Navigate back to Afshan PN's portfolio." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />

  <style>
    :root {
      --beige: #E6D3B3;
      --tan: #D2B48C;
      --accent: #A67B5B;
      --brown: #8B5A2B;
      --dark-brown: #3E2723;
      --mid-brown: #5C3A21;
      --bg-main: #E6D3B3;
      --bg-card: #F0E2CA;
      --border: rgba(139, 90, 43, 0.18);
      --border-hover: rgba(139, 90, 43, 0.42);
      --text-primary: #3E2723;
      --text-secondary: #5C3A21;
      --text-muted: #A67B5B;
      --gradient-primary: linear-gradient(135deg, #A67B5B 0%, #8B5A2B 100%);
      --gradient-glow: linear-gradient(135deg, #8B5A2B 0%, #A67B5B 100%);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Animated background particles */
    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-particles span {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(139, 90, 43, 0.15);
      border-radius: 50%;
      animation: float-particle linear infinite;
    }

    .bg-particles span:nth-child(1) {
      left: 10%;
      animation-duration: 12s;
      animation-delay: 0s;
    }

    .bg-particles span:nth-child(2) {
      left: 25%;
      animation-duration: 14s;
      animation-delay: 2s;
      width: 6px;
      height: 6px;
    }

    .bg-particles span:nth-child(3) {
      left: 40%;
      animation-duration: 10s;
      animation-delay: 4s;
    }

    .bg-particles span:nth-child(4) {
      left: 55%;
      animation-duration: 16s;
      animation-delay: 1s;
      width: 5px;
      height: 5px;
    }

    .bg-particles span:nth-child(5) {
      left: 70%;
      animation-duration: 11s;
      animation-delay: 3s;
    }

    .bg-particles span:nth-child(6) {
      left: 85%;
      animation-duration: 13s;
      animation-delay: 5s;
      width: 3px;
      height: 3px;
    }

    .bg-particles span:nth-child(7) {
      left: 15%;
      animation-duration: 15s;
      animation-delay: 6s;
      width: 5px;
      height: 5px;
    }

    .bg-particles span:nth-child(8) {
      left: 60%;
      animation-duration: 9s;
      animation-delay: 2s;
    }

    .bg-particles span:nth-child(9) {
      left: 35%;
      animation-duration: 17s;
      animation-delay: 7s;
      width: 4px;
      height: 4px;
    }

    .bg-particles span:nth-child(10) {
      left: 80%;
      animation-duration: 12s;
      animation-delay: 4s;
      width: 6px;
      height: 6px;
    }

    @keyframes float-particle {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh) rotate(720deg);
        opacity: 0;
      }
    }

    .error-container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 580px;
    }

    /* Large 404 number */
    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -6px;
      margin-bottom: 8px;
      background: var(--gradient-glow);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      animation: subtle-pulse 3s ease-in-out infinite;
    }

    @keyframes subtle-pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    /* Glitch effect on the 0 */
    .error-code .zero {
      position: relative;
      display: inline-block;
    }

    .error-code .zero::before,
    .error-code .zero::after {
      content: '0';
      position: absolute;
      left: 0;
      background: var(--gradient-glow);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-code .zero::before {
      animation: glitch-top 2.5s ease-in-out infinite;
      clip-path: inset(0 0 50% 0);
    }

    .error-code .zero::after {
      animation: glitch-bottom 2.5s ease-in-out infinite;
      clip-path: inset(50% 0 0 0);
    }

    @keyframes glitch-top {

      0%,
      90%,
      100% {
        transform: translate(0);
      }

      92% {
        transform: translate(-3px, -1px);
      }

      94% {
        transform: translate(3px, 1px);
      }

      96% {
        transform: translate(-1px, 0px);
      }
    }

    @keyframes glitch-bottom {

      0%,
      90%,
      100% {
        transform: translate(0);
      }

      93% {
        transform: translate(2px, 1px);
      }

      95% {
        transform: translate(-3px, -1px);
      }

      97% {
        transform: translate(1px, 0);
      }
    }

    .error-subtitle {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 700;
      color: var(--dark-brown);
      margin-bottom: 16px;
    }

    .error-description {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 36px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .error-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: #fff;
      box-shadow: 0 4px 18px rgba(139, 90, 43, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(139, 90, 43, 0.5);
    }

    .btn-outline {
      background: transparent;
      color: var(--dark-brown);
      border: 1.5px solid var(--border-hover);
    }

    .btn-outline:hover {
      border-color: var(--brown);
      background: rgba(139, 90, 43, 0.08);
      transform: translateY(-3px);
    }

    /* Decorative ring */
    .error-ring {
      position: absolute;
      width: 400px;
      height: 400px;
      border: 1px dashed rgba(139, 90, 43, 0.12);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: rotate-ring 30s linear infinite;
      pointer-events: none;
    }

    .error-ring-2 {
      width: 520px;
      height: 520px;
      border-style: solid;
      border-color: rgba(139, 90, 43, 0.06);
      animation-duration: 45s;
      animation-direction: reverse;
    }

    @keyframes rotate-ring {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    /* Footer link */
    .error-footer {
      margin-top: 48px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .error-footer a {
      color: var(--brown);
      text-decoration: none;
      font-weight: 600;
    }

    .error-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- Floating particles -->
  <div class="bg-particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="error-container">
    <div class="error-ring"></div>
    <div class="error-ring error-ring-2"></div>

    <div class="error-code">4<span class="zero">0</span>4</div>
    <h1 class="error-subtitle">Page Not Found</h1>
    <p class="error-description">
      The page you're looking for seems to have wandered off into the data void.
      Let's get you back on track.
    </p>

    <div class="error-actions">
      <a href="index.html" class="btn btn-primary">
        <i class='bx bx-home'></i> Back to Home
      </a>
      <a href="index.html#contact" class="btn btn-outline">
        <i class='bx bx-envelope'></i> Contact Me
      </a>
    </div>

    <p class="error-footer">
      <a href="index.html">afshanpn.online</a> — AI Developer & Data Science Enthusiast
    </p>
  </div>

</body>

</html>

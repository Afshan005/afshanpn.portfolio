<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Afshan PN</title>
  <meta name="description" content="Oops! The page you're looking for doesn't exist. Navigate back to Afshan PN's portfolio." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

  <style>
    .error-section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    
    .error-code {
      font-size: clamp(8rem, 25vw, 15rem);
      font-family: var(--font-heading);
      color: var(--text-main);
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 0 40px rgba(0, 255, 102, 0.2);
    }
    
    .error-code span {
      color: var(--accent-color);
      animation: blink 2s infinite;
    }

    .error-subtitle {
      font-size: clamp(2rem, 5vw, 3rem);
      font-family: var(--font-heading);
      color: var(--text-main);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .error-description {
      color: var(--text-muted);
      font-size: 1.2rem;
      max-width: 500px;
      margin-bottom: 40px;
    }
    
    .error-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .error-actions .btn i {
      margin-right: 8px;
    }
  </style>
</head>

<body>
  
  <main class="error-section">
    <div class="error-code">4<span>0</span>4</div>
    <h1 class="error-subtitle">Page Not Found</h1>
    <p class="error-description">
      The page you're looking for seems to have wandered off into the data void.
      Let's get you back on track.
    </p>

    <div class="error-actions">
      <a href="index.html" class="btn">
        <i class='bx bx-home'></i> Back to Home
      </a>
      <a href="index.html#contact" class="btn btn-outline">
        <i class='bx bx-envelope'></i> Contact Me
      </a>
    </div>
  </main>

</body>

</html>
